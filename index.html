<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Ultra Sports & Paint</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0f172a; font-family: 'Segoe UI', sans-serif; }
        canvas { width: 100vw; height: 100vh; display: block; position: absolute; top: 0; left: 0; z-index: 1; }
        video { display: none; }

        #menu-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 100; width: 340px; }
        #menu {
            width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 30px; padding: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); transition: 0.5s; max-height: 60px; overflow: hidden; cursor: pointer;
        }
        #menu.open { max-height: 500px; padding: 25px; cursor: default; }
        .menu-header { text-align: center; font-weight: 700; color: #fff; padding: 12px 0; letter-spacing: 1.5px; }
        .btn-list { opacity: 0; transition: 0.4s; pointer-events: none; }
        #menu.open .btn-list { opacity: 1; pointer-events: auto; }
        .btn {
            width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 18px;
            background: rgba(255, 255, 255, 0.1); color: #fff; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.2); }
        .active { background: #007AFF !important; box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4); }

        #score-display {
            position: absolute; top: 25px; right: 25px; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px); padding: 14px 24px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); font-size: 22px; font-weight: 800; z-index: 100; color: #fff;
        }
    </style>
</head>
<body>

<div id="menu-container">
    <div id="menu" onclick="toggleMenu(event)">
        <div class="menu-header">🎮 TANLASH</div>
        <div class="btn-list">
            <button class="btn active" onclick="changeMode('football', this, event)">⚽ Football</button>
            <button class="btn" onclick="changeMode('basketball', this, event)">🏀 Basketball</button>
            <button class="btn" onclick="changeMode('drawing', this, event)">✏️ Chizish & Qimirlatish</button>
            <button class="btn" onclick="clearAll(event)" style="background: rgba(255,0,0,0.2)">🗑 Tozalash</button>
        </div>
    </div>
</div>

<div id="score-display">SCORE: <span id="val" style="color: #007AFF;">0</span></div>
<video id="input_video"></video>
<canvas id="output_canvas"></canvas>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreVal = document.getElementById('val');
    const menu = document.getElementById('menu');

    let mode = 'football', score = 0, lastResults = null;
    let balls = [], drawings = [], grabbedBall = null, grabbedDrawing = null, currentDrawing = null;

    function toggleMenu(e) { if (!e.target.closest('.btn')) menu.classList.toggle('open'); }
    function clearAll(e) { e.stopPropagation(); drawings = []; balls = []; score = 0; scoreVal.innerText = "0"; setupBalls(); }

    function changeMode(m, el, e) {
        e.stopPropagation(); mode = m; score = 0; scoreVal.innerText = "0";
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        drawings = []; setupBalls();
        setTimeout(() => menu.classList.remove('open'), 300);
    }

    function resize() { canvasElement.width = window.innerWidth; canvasElement.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    class Ball {
        constructor() { this.radius = 35; this.spawn(); }
        spawn() {
            this.x = canvasElement.width / 2; this.y = canvasElement.height / 2;
            this.vx = 0; this.vy = 0; this.grabbed = false;
            this.color = (mode === 'basketball') ? '#ff6b00' : '#ffffff';
        }
        draw() {
            canvasCtx.save();
            canvasCtx.shadowBlur = 20; canvasCtx.shadowColor = this.color;
            let g = canvasCtx.createRadialGradient(this.x-10, this.y-10, 5, this.x, this.y, this.radius);
            g.addColorStop(0, '#fff'); g.addColorStop(0.5, this.color); g.addColorStop(1, '#333');
            canvasCtx.fillStyle = g; canvasCtx.beginPath();
            canvasCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            canvasCtx.fill(); canvasCtx.restore();
        }
        update() {
            if (!this.grabbed) {
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.98; this.vy *= 0.98;
                if (this.x < this.radius || this.x > canvasElement.width - this.radius) this.vx *= -0.7;
                if (this.y < this.radius || this.y > canvasElement.height - this.radius) this.vy *= -0.7;

                // Football logic
                if (mode === 'football' && Math.abs(this.y - canvasElement.height/2) < canvasElement.height*0.15) {
                    if (this.x < this.radius + 10 || this.x > canvasElement.width - this.radius - 10) {
                        score++; scoreVal.innerText = score; this.spawn();
                    }
                }
                // Basketball logic
                if (mode === 'basketball' && Math.hypot(this.x - canvasElement.width/2, this.y - 150) < 50) {
                    score++; scoreVal.innerText = score; this.spawn();
                }
            }
        }
    }

    function drawWorld() {
        canvasCtx.save();
        if (mode === 'football') {
            canvasCtx.strokeStyle = "#007AFF"; canvasCtx.lineWidth = 10; canvasCtx.shadowBlur = 20; canvasCtx.shadowColor = "#007AFF";
            // Darvozalar
            canvasCtx.strokeRect(-20, canvasElement.height*0.35, 50, canvasElement.height*0.3);
            canvasCtx.strokeRect(canvasElement.width-30, canvasElement.height*0.35, 50, canvasElement.height*0.3);
        }
        if (mode === 'basketball') {
            canvasCtx.strokeStyle = "#ff4500"; canvasCtx.lineWidth = 10; canvasCtx.shadowBlur = 25; canvasCtx.shadowColor = "#ff4500";
            // Savat
            canvasCtx.beginPath(); canvasCtx.ellipse(canvasElement.width/2, 150, 70, 25, 0, 0, Math.PI*2); canvasCtx.stroke();
            // Orqa taxta
            canvasCtx.strokeStyle = "#fff"; canvasCtx.lineWidth = 4;
            canvasCtx.strokeRect(canvasElement.width/2 - 100, 50, 200, 150);
        }
        canvasCtx.restore();
    }

    function setupBalls() { balls = (mode !== 'drawing') ? [new Ball()] : []; }
    setupBalls();

    function onResults(results) { lastResults = results; }

    function gameLoop() {
        canvasCtx.save(); canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        if (lastResults) {
            canvasCtx.translate(canvasElement.width, 0); canvasCtx.scale(-1, 1);
            canvasCtx.drawImage(lastResults.image, 0, 0, canvasElement.width, canvasElement.height);
            if (lastResults.multiHandLandmarks) {
                for (const landmarks of lastResults.multiHandLandmarks) {
                    const tx = landmarks[4].x * canvasElement.width, ty = landmarks[4].y * canvasElement.height;
                    const ix = landmarks[8].x * canvasElement.width, iy = landmarks[8].y * canvasElement.height;
                    const midX = (tx+ix)/2, midY = (ty+iy)/2, dist = Math.hypot(tx-ix, ty-iy);

                    if (dist < 45) {
                        if (mode === 'drawing') {
                            if (!grabbedDrawing && !currentDrawing) {
                                drawings.forEach(d => { d.points.forEach(p => { if(Math.hypot(p.x-midX, p.y-midY) < 30) grabbedDrawing = d; })});
                                if (!grabbedDrawing) { currentDrawing = {points:[{x:midX, y:midY}], color:'#00D1FF'}; drawings.push(currentDrawing); }
                            }
                            if (grabbedDrawing) {
                                let dx = midX - (grabbedDrawing.lx || midX), dy = midY - (grabbedDrawing.ly || midY);
                                grabbedDrawing.points.forEach(p=>{p.x+=dx; p.y+=dy}); grabbedDrawing.lx=midX; grabbedDrawing.ly=midY;
                            } else if(currentDrawing) currentDrawing.points.push({x:midX, y:midY});
                        } else {
                            if (!grabbedBall) balls.forEach(b => { if(Math.hypot(b.x-midX, b.y-midY) < 60) {grabbedBall=b; b.grabbed=true;}});
                        }
                    } else { 
                        if(grabbedBall) {grabbedBall.grabbed=false; grabbedBall=null;}
                        if(grabbedDrawing) {grabbedDrawing.lx=null; grabbedDrawing.ly=null; grabbedDrawing=null;}
                        currentDrawing = null;
                    }
                    if(grabbedBall) { grabbedBall.vx=(midX-grabbedBall.x)*0.5; grabbedBall.vy=(midY-grabbedBall.y)*0.5; grabbedBall.x=midX; grabbedBall.y=midY; }
                }
            }
        }
        drawWorld();
        drawings.forEach(d => {
            canvasCtx.beginPath(); canvasCtx.strokeStyle = (d===grabbedDrawing)?"#FFE600":d.color; canvasCtx.lineWidth=8;
            canvasCtx.moveTo(d.points[0].x, d.points[0].y); d.points.forEach(p=>canvasCtx.lineTo(p.x, p.y)); canvasCtx.stroke();
        });
        balls.forEach(b => { b.update(); b.draw(); });
        canvasCtx.restore(); requestAnimationFrame(gameLoop);
    }

    const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
    hands.onResults(onResults);
    new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 }).start();
    gameLoop();
</script>
</body>
</html>
